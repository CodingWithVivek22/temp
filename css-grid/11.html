<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example Page</title>

    <style>
        :root {
            --linkcolor: rgb(216, 219, 217);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        .container {
            background-color: black;
            height: 900px;
        }


        .top {
            font-weight: bold;
            color: aliceblue;
            text-align: center;

        }

        h1 {
            padding-top: 50px;
            font-size: 40px;
        }

        h1::selection {
            background-color: #ff9800;
            color: rgb(255, 0, 0);
        }

        .bottom {

            margin: 80px;
            padding-top: 0px;

            display: grid;
            grid-template-columns: repeat(3, 1fr);

            gap: 20px;
        }

        img {
            height: 100%;
            width: 100%;
        }

        .buttonclass {
            display: flex;
            justify-content: center;
            margin-top: 0px;

        }

        button {
            font-size: 30px;
            font-weight: bold;
            width: 400px;
            height: 80px;

            border-radius: 40px;

            cursor: pointer;
        }

        button:active {
            background-color: var(--linkcolor);
        }

        .planclass {
            font-size: 25px;
            margin-top: 25px;
            font-weight: bold;

            display: flex;
            justify-content: center;
        }

        a {
            color: white;
        }

        a:hover {
            color: var(--linkcolor);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="top">
            <h1>
                IFTTT Pro and Pro+ <br>
                Make Your Apples More <br>
                Powerful
            </h1>
        </div>

        <div class="bottom">

            <div class="img1">
                <img src="https://web-assets.ifttt.com/builds/assets/more-applets@2x-CkkP9gqI.png" alt="Image 1">
            </div>

            <div class="img2">
                <img src="https://web-assets.ifttt.com/builds/assets/multiple-actions@2x-DCoVVW2E.png" alt="Image 2">
            </div>

            <div class="img3">
                <img src="https://web-assets.ifttt.com/builds/assets/exclusive-benefits@2x-MGbw9k7E.png" alt="Image 3">
            </div>
        </div>

        <div class="buttonclass">
            <button>Start Your Free Trial</button>
        </div>

        <div class="planclass">
            <a href="">More about our plans</a>
        </div>
    </div>

</body>

</html>
